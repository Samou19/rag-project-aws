version: "3.9"

services:
  api:
    volumes:
      - ~/.aws:/root/.aws:ro
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: rag-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: always

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    container_name: rag-ui
    ports:
      - "8501:8501"
    depends_on:
      - api
    env_file:
      - .env
    restart: always